name: Build Android APK with Buildozer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4.2.2

    # 🌟 终极绝杀：直接调用 Kivy 官方维护的 Buildozer 容器化 Action
    # 该容器内部已经死锁了最完美的 JDK、NDK、libtool、Aidl 等全套环境，无视宿主机任何污染
    - name: Build APK with Buildozer Action
      uses: ArtemSaves/action-buildozer@v1.3.0
      with:
        # 自动使用项目根目录下的 buildozer.spec
        buildozer_version: master
        # 如果需要更详细的日志，可以在这里看
        command: buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-python-android-apk
        path: bin/*.apk
