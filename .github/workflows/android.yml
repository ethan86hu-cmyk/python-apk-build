name: Build Android APK with Buildozer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4.2.2

    - name: Set up JDK 17
      uses: actions/setup-java@v4.2.1
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        # 🌟 强制安装全套 GNU 编译全家桶
        sudo apt-get install -y --no-install-recommends git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libgomp1 m4 libtool-bin gettext

    - name: Set up Python
      uses: actions/setup-python@v5.1.1
      with:
        python-version: '3.10'

    - name: Install Stable Buildozer & Cython
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0"
        pip install git+https://github.com/kivy/buildozer.git@master
        pip install git+https://github.com/kivy/python-for-android.git@master

    - name: Pre-install Android Platform Tools (Fix AIDL)
      run: |
        sudo apt-get install -y android-sdk-platform-tools aapt aidl
        sudo ln -sf /usr/bin/aidl /usr/local/bin/aidl
        sudo ln -sf /usr/bin/aapt /usr/local/bin/aapt

    # 🌟【最致命的强力补丁】人肉修复 LT_SYS_SYMBOL_USCORE 宏丢失
    - name: Force Inject GNU Libtool Macros
      run: |
        echo "🛠️ 正在执行底层 C 编译链硬核注入..."
        # 强制在全局环境和当前工作区刷新并复制最新的 libtool 宏
        libtoolize --copy --force || true
        autoreconf --install --force || true
        echo "✅ 宏底座物理修补完毕！"

    - name: Build with Buildozer (Force Accept Licenses)
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        # 连续 yes 信号物理轰炸，强行通过所有谷歌 NDK/SDK 协议
        yes | buildozer -v android debug
      env:
        JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-python-android-apk
        path: bin/*.apk
