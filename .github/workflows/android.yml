name: Build Android APK with Buildozer

on:
  workflow_dispatch:

jobs:
  build:
    # 🌟 核心突破：让整个打包任务直接在 Kivy 官方亲自维护的 Buildozer 纯净 Docker 容器中运行
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest

    steps:
    # 第一步：把你的 Python 代码拉取到容器中
    - name: Checkout Code
      uses: actions/checkout@v4.2.2

    # 第二步：由于官方容器已经帮我们把 JDK、NDK、SDK、Libtool、Aidl 全部配好了
    # 我们只需要在容器里直接高歌猛进，一行命令开始总攻
    - name: Build with Buildozer (Official Container)
      run: |
        echo "🚀 正在官方正统 Kivy/Buildozer 容器内部启动编译..."
        # 建立谷歌许可配置，防止偶发性由于权限卡死
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        # 自动接受所有谷歌许可协议，并一键编译
        yes | buildozer -v android debug

    # 第三步：把打包好的 APK 扔出来供你下载
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-python-android-apk
        path: bin/*.apk
