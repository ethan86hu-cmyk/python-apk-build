name: Build Android APK with Buildozer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4.2.2

    - name: Set up JDK 17
      uses: actions/setup-java@v4.2.1
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libgomp1

    - name: Set up Python
      uses: actions/setup-python@v5.1.1
      with:
        python-version: '3.10' # 🌟 特效药一：将云端 Python 稍微降到最稳的 3.10，彻底避开 3.11 的编译 Bug

    - name: Install Stable Buildozer & Cython
      run: |
        pip install --upgrade pip
        # 🌟 特效药二：死锁最兼容的编译组件版本，防止 C 语言报错
        pip install "cython<3.0.0"
        pip install git+https://github.com/kivy/buildozer.git@master
        pip install git+https://github.com/kivy/python-for-android.git@master

    - name: Pre-install Android Platform Tools (Fix AIDL)
      run: |
        sudo apt-get install -y android-sdk-platform-tools aapt aidl
        sudo ln -sf /usr/bin/aidl /usr/local/bin/aidl
        sudo ln -sf /usr/bin/aapt /usr/local/bin/aapt

    - name: Build with Buildozer (Force Accept Licenses)
      run: |
        # 🌟 特效药三：在物理运行编译前，强行在云端建立 Android 许可目录并自动授权
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        # 核心绝杀：用连续的 yes 信号物理轰炸，强行通过所有谷歌 NDK/SDK 协议硬关卡
        yes | buildozer -v android debug
      env:
        JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-python-android-apk
        path: bin/*.apk
