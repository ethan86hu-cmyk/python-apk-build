name: Build Android APK with Buildozer

on:
  workflow_dispatch: # 允许你随时在网页上点击按钮，手动触发打包

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 🌟 2026年最新适配版：全部升级到锁死 Node.js 24 运行环境的最新 Action 版本
    - name: Checkout Code
      uses: actions/checkout@v4.2.2 # 显式升级小版本

    - name: Set up JDK 17
      uses: actions/setup-java@v4.2.1 # 升级组件版本
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libgomp1

    - name: Set up Python
      uses: actions/setup-python@v5.1.1 # 升级组件版本
      with:
        python-version: '3.11'

    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython git+https://github.com/kivy/plyer.git

    - name: Build with Buildozer
      run: |
        # 🌟 视频核心调试技巧：如果打包再次崩溃，这里能打印出最详细的错误真凶
        buildozer -v android debug
      env:
        JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-python-android-apk
        path: bin/*.apk
